<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" role="img" aria-label="Stylized map of downtown Palo Alto centered on University Avenue Caltrain station with quarter-mile and half-mile distance rings">
  <defs>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#9b9b95" stroke-width="2"/>
    </pattern>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d6efe2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d6efe2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="540" fill="#fbfaf6"/>

  <!-- distance halo for visual interest -->
  <circle cx="155" cy="270" r="320" fill="url(#halo)"/>

  <!-- rings -->
  <circle cx="155" cy="270" r="40" fill="none" stroke="#1f6f4e" stroke-width="2"/>
  <circle cx="155" cy="270" r="170" fill="none" stroke="#1f6f4e" stroke-width="2"/>
  <circle cx="155" cy="270" r="320" fill="none" stroke="#1f6f4e" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- ring labels -->
  <text x="155" y="115" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#0e3d2c" font-weight="600">¼ mile</text>
  <text x="155" y="-40" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#0e3d2c" font-weight="600">½ mile</text>

  <!-- tracks -->
  <rect x="105" y="0" width="20" height="540" fill="#dcd6c2"/>
  <line x1="115" y1="0" x2="115" y2="540" stroke="#9b9b95" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- streets, named -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#e2dcc7" stroke-width="14"/>
  <line x1="0" y1="270" x2="800" y2="270" stroke="#e2dcc7" stroke-width="18"/>
  <line x1="0" y1="335" x2="800" y2="335" stroke="#e2dcc7" stroke-width="14"/>
  <line x1="0" y1="395" x2="800" y2="395" stroke="#e2dcc7" stroke-width="14"/>

  <line x1="225" y1="0" x2="225" y2="540" stroke="#e2dcc7" stroke-width="14"/>
  <line x1="305" y1="0" x2="305" y2="540" stroke="#e2dcc7" stroke-width="14"/>
  <line x1="395" y1="0" x2="395" y2="540" stroke="#e2dcc7" stroke-width="14"/>
  <line x1="490" y1="0" x2="490" y2="540" stroke="#e2dcc7" stroke-width="14"/>
  <line x1="595" y1="0" x2="595" y2="540" stroke="#e2dcc7" stroke-width="14"/>

  <!-- street labels -->
  <text x="790" y="204" text-anchor="end" font-family="ui-sans-serif,system-ui" font-size="10" fill="#7c7868">Lytton Ave</text>
  <text x="790" y="266" text-anchor="end" font-family="ui-sans-serif,system-ui" font-size="11" fill="#7c7868" font-weight="600">University Ave</text>
  <text x="790" y="339" text-anchor="end" font-family="ui-sans-serif,system-ui" font-size="10" fill="#7c7868">Hamilton Ave</text>
  <text x="790" y="399" text-anchor="end" font-family="ui-sans-serif,system-ui" font-size="10" fill="#7c7868">Forest Ave</text>

  <text x="225" y="525" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="9" fill="#7c7868">Alma</text>
  <text x="305" y="525" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="9" fill="#7c7868">High</text>
  <text x="395" y="525" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="9" fill="#7c7868">Bryant</text>
  <text x="490" y="525" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="9" fill="#7c7868">Ramona</text>
  <text x="595" y="525" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="9" fill="#7c7868">Emerson</text>

  <!-- station -->
  <rect x="130" y="252" width="50" height="36" rx="4" fill="#1c1c1a"/>
  <text x="155" y="275" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="10" font-weight="700" fill="#fbfaf6">CALTRAIN</text>
  <text x="155" y="245" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" font-weight="600" fill="#1c1c1a">Palo Alto</text>

  <!-- Compass / scale -->
  <g transform="translate(720,40)">
    <text x="0" y="0" font-family="ui-sans-serif,system-ui" font-size="10" fill="#7c7868">N</text>
    <line x1="6" y1="-3" x2="6" y2="22" stroke="#7c7868" stroke-width="1"/>
    <polygon points="6,-3 3,3 9,3" fill="#7c7868"/>
  </g>
</svg>
